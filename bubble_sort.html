<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>氣泡排序法展示</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #4CAF50;
        }
        input, button {
            padding: 10px;
            margin: 10px 5px;
            font-size: 16px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .output {
            margin-top: 20px;
        }
        #animationContainer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 10px;
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .bar {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            font-size: 14px;
            font-weight: bold;
            border-radius: 3px;
        }
        .step {
            background-color: #e7f3e7;
            padding: 10px;
            margin: 5px 0;
            border-left: 4px solid #4CAF50;
            border-radius: 3px;
        }
        #steps {
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        #report {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        #report p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>氣泡排序法</h1>
    <a href="index.html">← 返回首頁</a>
    <p>請輸入一組數字（以逗號分隔，例如：5,3,8,6,2）：</p>
    <input type="text" id="inputArray" placeholder="輸入數字">
    <button onclick="generateRandomNumbers()">隨機生成數字</button>
    <button onclick="performBubbleSort()">排序</button>

    <div class="output">
        <h2>排序過程</h2>
        <div id="steps"></div>
        <h2>統整報告</h2>
        <div id="report"></div>
    </div>

    <script>
        // 隨機生成一組數字
        function generateRandomNumbers() {
            const randomArray = Array.from({ length: 10 }, () => Math.floor(Math.random() * 100) + 1);
            document.getElementById('inputArray').value = randomArray.join(',');
        }

        async function performBubbleSort() {
            const input = document.getElementById('inputArray').value;
            const array = input.split(',').map(Number);
            const stepsDiv = document.getElementById('steps');
            const reportDiv = document.getElementById('report');

            stepsDiv.innerHTML = '';
            reportDiv.innerHTML = '';

            let steps = 0;

            // 清空動畫容器
            const animationContainer = document.createElement('div');
            animationContainer.id = 'animationContainer';
            stepsDiv.appendChild(animationContainer);

            // 初始化動畫元素
            array.forEach((num, index) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${num * 10}px`;
                bar.style.width = '30px';
                bar.style.backgroundColor = 'skyblue';
                bar.style.textAlign = 'center';
                bar.style.lineHeight = `${num * 10}px`;
                bar.style.color = 'white';
                bar.textContent = num;
                animationContainer.appendChild(bar);
            });

            const bars = document.querySelectorAll('.bar');

            // 氣泡排序法實現（帶動畫）
            for (let i = 0; i < array.length - 1; i++) {
                for (let j = 0; j < array.length - i - 1; j++) {
                    // 高亮當前比較的元素
                    bars[j].style.backgroundColor = 'orange';
                    bars[j + 1].style.backgroundColor = 'orange';

                    await new Promise(resolve => setTimeout(resolve, 500)); // 延遲動畫

                    if (array[j] > array[j + 1]) {
                        // 交換數值
                        [array[j], array[j + 1]] = [array[j + 1], array[j]];
                        steps++;

                        // 更新動畫元素
                        bars[j].style.height = `${array[j] * 10}px`;
                        bars[j].textContent = array[j];
                        bars[j + 1].style.height = `${array[j + 1] * 10}px`;
                        bars[j + 1].textContent = array[j + 1];

                        // 顯示每一步驟
                        const step = document.createElement('div');
                        step.className = 'step';
                        step.textContent = `步驟 ${steps}: ${array.join(', ')}`;
                        stepsDiv.appendChild(step);
                    }

                    // 恢復顏色
                    bars[j].style.backgroundColor = 'skyblue';
                    bars[j + 1].style.backgroundColor = 'skyblue';

                    await new Promise(resolve => setTimeout(resolve, 500)); // 延遲動畫
                }
            }

            // 統整報告
            const report = `
                <p>排序完成！</p>
                <p>排序結果：${array.join(', ')}</p>
                <p>總執行步驟數：${steps}</p>
            `;
            reportDiv.innerHTML = report;
        }
    </script>
</body>
</html>
